services:
  # Python Backend (Django)
  - type: web
    name: backend-soporte
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT backend.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db-soporte
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://frontend-soporte.onrender.com" # Default assumption
    disk:
      name: media-soporte
      mountPath: /opt/render/project/src/Backend-PROYECTO_MOC_B2B/media
      sizeGB: 1
    rootDir: Backend-PROYECTO_MOC_B2B

  # Node Frontend (Next.js)
  - type: web
    name: frontend-soporte
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: backend-soporte
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_WS_URL
        value: "wss://backend-soporte.onrender.com" # Construct manually
    rootDir: Frontend-PROYECTO_MOC_B2B

databases:
  - name: db-soporte
    plan: free # Change if needed
